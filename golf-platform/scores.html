<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Score | Golf Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h3 onclick="goTo('dashboard')">< Back</h3>
        </div>
    </nav>

    <div class="container" style="padding-top: 4rem; text-align: center;">
        <h1>🏌️ Enter Score</h1>
        <p>Stableford format - max honest score</p>
        
        <div class="card" style="max-width: 500px; margin: 3rem auto;">
            <div style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem;">
                <input type="number" id="score-input" placeholder="Score" style="padding: 16px; font-size: 2rem; border: 2px solid #e5e7eb; border-radius: 12px; width: 150px; text-align: center;">
                <button class="btn" onclick="saveScore()" style="padding: 16px 32px; font-size: 1.2rem;">Save Score</button>
            </div>
            <p style="opacity: 0.8;">Recent scores: 42, 38, 45</p>
        </div>
        
        <button class="cta-btn" onclick="goTo('dashboard')">← Back to Dashboard</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
