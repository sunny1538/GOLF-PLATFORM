<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Golf Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #1f2937;">
    <div class="container" style="padding: 4rem 0; text-align: center;">
        <h1 style="color: white;">Admin Panel</h1>
        <div class="card" style="max-width: 500px; margin: 3rem auto;">
            <button class="btn" onclick="adminLogin()" style="width: 100%; padding: 20px; font-size: 1.3rem;">
                Login as Admin
            </button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        function adminLogin() {
            const pass = prompt('Admin Password (demo: admin123):');
            if (pass === 'admin123') {
                document.body.innerHTML = `
                <div class="container" style="padding: 4rem 0;">
                    <h1 style="color: white;">🛠️ Admin Dashboard</h1>
                    <div class="grid">
                        <div class="card"><h3>Users</h3><p>1,247 Active</p><button class="btn">View</button></div>
                        <div class="card"><h3>Draws</h3><p>$5,250 Pot</p><button class="btn" onclick="alert('Draw triggered!')">Run Draw</button></div>
                        <div class="card"><h3>Revenue</h3><p>$12,450/mo</p></div>
                        <div class="card"><h3>Charity</h3><p>$3,250 Raised</p></div>
                    </div>
                </div>
                `;
            }
        }
    </script>
</body>
</html>
